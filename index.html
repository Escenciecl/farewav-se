/* ─── Parser de lenguaje natural ────────────────────────── */
const CITIES = {
  "bogota":"BOG","medellin":"MDE","cali":"CLO","cartagena":"CTG",
  "barranquilla":"BAQ","bucaramanga":"BGA","pereira":"PEI",
  "mexico":"MEX","ciudad de mexico":"MEX","cdmx":"MEX",

  "dubai":"DXB","toronto":"YYZ","habana":"HAV","la habana":"HAV",
  "santo domingo":"SDQ","san juan":"SJU",
};
const MONTHS = {
  "enero":"01","febrero":"02","marzo":"03","abril":"04",
  "mayo":"05","junio":"06","julio":"07","agosto":"08",
  "septiembre":"09","octubre":"10","noviembre":"11","diciembre":"12",
};

function parseMsg(raw) {
  const t = raw.toLowerCase()
    .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i")
    .replace(/ó/g,"o").replace(/ú/g,"u").replace(/ñ/g,"n");

  const sorted = Object.entries(CITIES).sort((a,b)=>b[0].length-a[0].length);
  const found = [];
  for (const [city,code] of sorted) {
    const norm = city.replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i").replace(/ó/g,"o").replace(/ú/g,"u");
    const idx = t.indexOf(norm);
    if (idx !== -1 && !found.find(f=>f.code===code)) found.push({code, pos:idx});
  }
  found.sort((a,b)=>a.pos-b.pos);
  let origin = found[0]?.code||null, destination = found[1]?.code||null;
  const dePos = t.search(/\bde\b|\bdesde\b/), aPos = t.search(/\ba\b|\bhasta\b|\bhacia\b/);
  if (dePos!==-1 && aPos!==-1 && found.length>=2) {
    const bA = found.filter(f=>f.pos>dePos&&f.pos<aPos);
    const aA = found.filter(f=>f.pos>aPos);
    if (bA.length) origin=bA[0].code;
    if (aA.length) destination=aA[0].code;
  }

  const today=new Date(), y=today.getFullYear();
  let date=null;
  const iso=raw.match(/(\d{4}-\d{2}-\d{2})/);
  const dm=t.match(/(\d{1,2})\s+de\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)/);
  const mo=t.match(/(?:en|para|durante)\s+(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre)/);
  if (iso) date=iso[1];
  else if (dm) {
    const mon=MONTHS[dm[2]], dy=dm[1].padStart(2,"0");
    date=`${today.getMonth()+1>parseInt(mon)?y+1:y}-${mon}-${dy}`;
  } else if (mo) {
    const mon=MONTHS[mo[1]];
    date=`${today.getMonth()+1>parseInt(mon)?y+1:y}-${mon}-01`;
  } else {
    const d=new Date(today.getTime()+30*24*60*60*1000);
    date=d.toISOString().split("T")[0];
  }

  let passengers=1;
  const pax=raw.match(/(\d+)\s*(?:personas?|pasajeros?|adultos?)/i)||raw.match(/para\s+(\d+)/i);
  if (pax) passengers=Math.min(9,parseInt(pax[1]));
  return {origin,destination,date,passengers};
}

/* ─── Llama a la Netlify Function ────────────────────────── */
async function searchFlights(message) {
  const parsed = parseMsg(message);
  if (!parsed.origin || !parsed.destination) {
    return { error:`No pude identificar origen y destino. Intenta: "Vuelo de Bogotá a Madrid en julio para 2 personas".` };
  }
  const res = await fetch("/.netlify/functions/search", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ message }),
  });
  return res.json();
}

      React.createElement("div",{style:{display:"flex",alignItems:"flex-end",gap:"10px",background:focused?"rgba(0,232,150,0.04)":"rgba(255,255,255,0.03)",border:focused?"1px solid rgba(0,232,150,0.4)":"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"14px 16px",boxShadow:focused?"0 0 0 3px rgba(0,232,150,0.08)":"none",transition:"all 0.22s"}},
        React.createElement("textarea",{ref,value,onChange:e=>{onChange(e.target.value);autoResize(e);},onKeyDown:handleKey,onFocus:()=>setFocused(true),onBlur:()=>setFocused(false),placeholder:"Describe tu viaje: destino, fechas y presupuesto...",disabled,rows:1,style:{flex:1,background:"none",border:"none",outline:"none",resize:"none",fontSize:"15px",color:"#D4EEF8",fontFamily:"inherit",lineHeight:1.6,maxHeight:"130px",overflowY:"auto",padding:"0",opacity:disabled?0.4:1}}),
        React.createElement("button",{onClick:onSend,disabled:!canSend,style:{width:"38px",height:"38px",borderRadius:"11px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:canSend?"linear-gradient(135deg,#00E896,#1C8EFF)":"rgba(255,255,255,0.05)",border:"none",cursor:canSend?"pointer":"not-allowed",transition:"all 0.2s",boxShadow:canSend?"0 2px 16px rgba(0,232,150,0.3)":"none"}},
          React.createElement("svg",{width:"15",height:"15",viewBox:"0 0 24 24",fill:"none"},
            React.createElement("path",{d:"M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13",stroke:canSend?"#070D14":"rgba(255,255,255,0.2)",strokeWidth:"2.5",strokeLinecap:"round",strokeLinejoin:"round"})))),
      React.createElement("p",{style:{textAlign:"center",fontSize:"11px",color:"rgba(74,107,138,0.6)",marginTop:"10px"}},"Enter para enviar · Shift+Enter para nueva línea")));
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);

  const send=async()=>{
    const text=input.trim();
    if(!text||loading) return;
    setInput("");
    setMessages(prev=>[...prev,{role:"user",text}]);
    setLoading(true);
    try {
      const data=await searchFlights(text);
      if(data.error) setMessages(prev=>[...prev,{role:"assistant",type:"error",text:data.error}]);
      else setMessages(prev=>[...prev,{role:"assistant",type:"results",data}]);
    } catch(e) {
      setMessages(prev=>[...prev,{role:"assistant",type:"error",text:"No pude conectar con Amadeus. Verifica que las variables AMADEUS_KEY y AMADEUS_SECRET estén configuradas en Netlify → Site configuration → Environment variables."}]);
    } finally { setLoading(false); }
  };

  return React.createElement("div",{style:{height:"100vh",display:"flex",flexDirection:"column",background:"#070D14",overflow:"hidden",position:"relative"}},
    React.createElement(BgOrbs),
    React.createElement("nav",{style:{height:"56px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",flexShrink:0,background:"rgba(7,13,20,0.9)",backdropFilter:"blur(12px)",position:"relative",zIndex:50}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"9px"}},
        React.createElement("div",{style:{width:"30px",height:"30px",borderRadius:"9px",background:"linear-gradient(135deg,#00E896,#1C8EFF)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"#070D14",fontWeight:900,boxShadow:"0 2px 14px rgba(0,232,150,0.3)"}},"✦"),
        React.createElement("span",{style:{fontSize:"17px",fontWeight:800,letterSpacing:"-0.04em",color:"#E8F4FF"}},
          "fare",React.createElement("span",{style:{background:"linear-gradient(90deg,#00E896,#1C8EFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"wave"))),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"16px"}},
        messages.length>0&&React.createElement("button",{onClick:()=>{setMessages([]);setInput("");},style:{fontSize:"13px",color:"#4A6B8A",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:500}},"Nueva búsqueda"),
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"5px 12px",borderRadius:"100px",background:"rgba(0,232,150,0.06)",border:"1px solid rgba(0,232,150,0.15)"}},
          React.createElement("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:"#00E896",boxShadow:"0 0 8px rgba(0,232,150,0.7)"}}),
          React.createElement("span",{style:{fontSize:"11px",color:"#00E896",fontWeight:700,letterSpacing:"0.04em"}},"Amadeus API")))),
    React.createElement("div",{style:{flex:1,overflowY:"auto",position:"relative",zIndex:1}},
      messages.length===0
        ?React.createElement(Welcome,{onSuggestion:s=>setInput(s)})
        :React.createElement("div",{style:{maxWidth:"780px",margin:"0 auto",padding:"36px 24px",display:"flex",flexDirection:"column",gap:"30px"}},
          ...messages.map((m,i)=>{
            const isLatest=i===messages.length-1;
            if(m.role==="user") return React.createElement(UserMsg,{key:i,text:m.text});
            if(m.type==="results") return React.createElement(ResultsMsg,{key:i,data:m.data,isLatest});
            if(m.type==="error") return React.createElement(ErrMsg,{key:i,text:m.text});
            return null;
          }),
          loading&&React.createElement(Thinking,{key:"thinking"}),
          React.createElement("div",{ref:bottomRef}))),
    React.createElement(InputBox,{value:input,onChange:setInput,onSend:send,disabled:loading}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
