const {useState,useEffect,useRef,useCallback} = React;
const fmtDate = d => d ? new Date(d+"T12:00:00").toLocaleDateString("es-CO",{day:"numeric",month:"short"}) : "";
const todayStr = () => new Date().toISOString().split("T")[0];
const minDate = todayStr();

const CURRENCIES = {
  "COP": { symbol:"$", name:"Peso colombiano",   locale:"es-CO", decimals:0 },
  "USD": { symbol:"US$", name:"Dólar americano", locale:"en-US", decimals:0 },
  "EUR": { symbol:"€",  name:"Euro",             locale:"de-DE", decimals:0 },
  "ARS": { symbol:"$",  name:"Peso argentino",   locale:"es-AR", decimals:0 },
  "MXN": { symbol:"$",  name:"Peso mexicano",    locale:"es-MX", decimals:0 },
  "PEN": { symbol:"S/", name:"Sol peruano",      locale:"es-PE", decimals:2 },
  "CLP": { symbol:"$",  name:"Peso chileno",     locale:"es-CL", decimals:0 },
  "BRL": { symbol:"R$", name:"Real brasileño",   locale:"pt-BR", decimals:2 },
  "GBP": { symbol:"£",  name:"Libra esterlina",  locale:"en-GB", decimals:2 },
};

function fmt(n, currency="COP") {
  const c = CURRENCIES[currency]||CURRENCIES["COP"];
  return `${c.symbol}${Number(n).toLocaleString(c.locale,{minimumFractionDigits:c.decimals,maximumFractionDigits:c.decimals})}`;
}

/* ── Parseo de presupuesto del texto ── */
function parseBudget(text, currency="COP") {
  const t = text.replace(/\./g,"").replace(/,/g,".");
  const m = t.match(/[\$]?\s*(\d[\d.,]*)/);
  if (!m) return null;
  const n = parseFloat(m[1].replace(",","."));
  // Heurística por moneda para detectar si falta el valor completo
  if (currency==="COP"&&n<10000) return Math.round(n*1000000);
  if (currency==="CLP"&&n<10000) return Math.round(n*1000000);
  return Math.round(n);
}

/* ── Explore Form (Mode 2) ── */
function ExploreForm({onSearch,onBack}) {

/* ════════ APP ════════ */
function App() {
  const [screen,setScreen]=useState("welcome"); // welcome | search-form | explore-form | loading | results | error
  const [results,setResults]=useState(null);
  const [error,setError]=useState("");
  const [loadingLabel,setLoadingLabel]=useState("Buscando vuelos");
  const topRef=useRef();

  const scrollTop = () => topRef.current?.scrollIntoView({behavior:"smooth"});

  const handleMode = mode => { setScreen(mode===("search")?"search-form":"explore-form"); scrollTop(); };

  const handleSearch = async params => {
    setScreen("loading");
    setLoadingLabel(params.mode==="explore"?"Explorando destinos con tu presupuesto":"Buscando los mejores vuelos");
    scrollTop();
    try {
      const res = await fetch("/.netlify/functions/search",{
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(params)
      });
      const data = await res.json();
      if (data.error) { setError(data.error); setScreen("error"); }
      else { setResults(data); setScreen("results"); }
    } catch(e) {
      setError("No pude conectar con el servidor. Verifica tu conexión e inténtalo de nuevo.");
      setScreen("error");
    }
    scrollTop();
  };

  const handleNew = () => { setScreen("welcome"); setResults(null); setError(""); scrollTop(); };
  const handleBack = () => { setScreen("welcome"); scrollTop(); };

  return React.createElement("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#070D14",position:"relative"}},
    React.createElement(BgOrbs),
    // NAV
    React.createElement("nav",{style:{height:"56px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",flexShrink:0,background:"rgba(7,13,20,0.92)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:50}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"9px",cursor:"pointer"},onClick:handleNew},
        React.createElement(Logo,{size:28}),
        React.createElement("span",{style:{fontSize:"17px",fontWeight:800,letterSpacing:"-0.04em",color:"#E8F4FF"}},
          "fare",React.createElement("span",{style:{background:"linear-gradient(90deg,#00E896,#1C8EFF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"wave"))),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"5px 12px",borderRadius:"100px",background:"rgba(0,232,150,0.06)",border:"1px solid rgba(0,232,150,0.15)"}},
        React.createElement("div",{style:{width:"6px",height:"6px",borderRadius:"50%",background:"#00E896",boxShadow:"0 0 8px rgba(0,232,150,0.7)",animation:"pulse 2s ease-in-out infinite"}}),
        React.createElement("span",{style:{fontSize:"11px",color:"#00E896",fontWeight:700,letterSpacing:"0.04em"}},"Vuelos reales"))),

    // BODY
    React.createElement("div",{ref:topRef,style:{flex:1,overflowY:"auto",position:"relative",zIndex:1}},
      React.createElement("div",{style:{maxWidth:"780px",margin:"0 auto",padding:"40px 24px",display:"flex",flexDirection:"column",alignItems:"center",minHeight:"calc(100vh - 56px)"}},

        screen==="welcome" && React.createElement(Welcome,{onMode:handleMode}),

        screen==="search-form" && React.createElement(SearchForm,{onSearch:handleSearch,onBack:handleBack}),

        screen==="explore-form" && React.createElement(ExploreForm,{onSearch:handleSearch,onBack:handleBack}),

        screen==="loading" && React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",flex:1,minHeight:"300px"}},
          React.createElement(Thinking,{label:loadingLabel})),

        screen==="results" && results?.mode==="search" &&
          React.createElement(SearchResults,{data:results,onNew:handleNew}),

        screen==="results" && results?.mode==="explore" &&
          React.createElement(ExploreResults,{data:results,onSearch:handleSearch,onNew:handleNew}),

        screen==="error" && React.createElement(ErrMsg,{text:error,onNew:handleNew})
      )));
}
